<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BachelorPulse | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent-blue: #38bdf8;
            --accent-pink: #f472b6;
            --glass: rgba(15, 23, 42, 0.85);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-light);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: var(--glass);
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            max-width: 420px;
            width: 90%;
        }

        /* --- Pulsating Logo Section --- */
        .logo-container {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 35px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-circle {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--accent-blue), #6366f1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka', sans-serif;
            font-size: 2.5rem;
            color: white;
            font-weight: 700;
            z-index: 5;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
        }

        /* The Pulse Effect */
        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--accent-blue);
            opacity: 0.7;
            animation: pulse-ring 2s infinite ease-out;
            z-index: 1;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        /* ----------------------------- */

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .main-message {
            color: var(--text-muted);
            font-size: 1.15rem;
            margin: 25px 0 35px 0;
            font-weight: 300;
            line-height: 1.6;
        }

        /* The Original Desi Slogan */
        .slogan-original {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-pink);
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 25px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="logo-container">
            <div class="pulse-ring"></div>
            <div class="logo-circle">BP</div>
        </div>

        <h1>BachelorPulse💓</h1>
        
        <p class="main-message">
            Something big is coming... <br>
            Our ultimate learning engine is getting ready for launch.
        </p>
        
        <div class="slogan-original">
            Practice ki Raftaar, Revision ki Shakti
        </div>
    </div>

</body>
</html>
