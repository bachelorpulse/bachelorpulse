<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BachelorPulse | Welcome ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Cute & Pro colors */
            --primary: #6366f1; /* Indigo (Pro) */
            --accent: #f472b6;  /* Pink (Cute) */
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .main-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 60px 50px;
            border-radius: 40px; /* Super rounded corners */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
            border: 3px solid #e0f2fe; /* Light blue border */
            width: 450px;
            max-width: 90%;
            position: relative;
        }

        h1 {
            font-family: 'Fredoka', sans-serif; /* Cute font for title */
            font-size: 3rem;
            margin-bottom: 5px;
            margin-top: 0;
            color: var(--primary);
            position: relative;
            display: inline-block;
        }

        /* The 'Heart Pulse' effect from your old interface */
        .heart-pulse {
            display: inline-block;
            font-size: 3rem;
            margin-left: 10px;
            animation: heart-pulse 1.5s infinite;
        }

        p.welcome-text {
            font-size: 1.3rem;
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .cta-button {
            background-color: var(--primary);
            color: white;
            padding: 18px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .cta-button:hover {
            transform: scale(1.05); /* Bouncy hover effect */
            background-color: #4f46e5;
            box-shadow: 0 15px 25px rgba(99, 102, 241, 0.4);
        }

        /* Decorative "floating" dots */
        .decorative-dot {
            width: 20px;
            height: 20px;
            background-color: var(--accent);
            border-radius: 50%;
            position: absolute;
            opacity: 0.3;
            animation: float 4s infinite ease-in-out;
        }

        @keyframes heart-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .footer {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 0.9rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="decorative-dot" style="top: 10%; left: 10%; background-color: #a5b4fc; width: 30px; height: 30px;"></div>
        <div class="decorative-dot" style="bottom: 15%; right: 10%; animation-delay: 1s;"></div>
        <div class="decorative-dot" style="top: 40%; right: 5%; background-color: #e0f2fe; width: 15px; height: 15px; animation-delay: 2s;"></div>

        <h1>BachelorPulse<span class="heart-pulse">💓</span></h1>
        
        <p class="welcome-text">Practice ki Raftaar, Revision ki Shakti!</p>
        
        <a href="#" class="cta-button">🚀 Start Practicing!</a>
        
        <div class="footer">
            Study hard, party harder!
        </div>
    </div>
</body>
</html>
