<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BachelorPulse | Coming Soon ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Ek soft, gradient background */
            background: linear-gradient(135deg, #e0f2fe 0%, #ede9fe 100%);
            color: #1e293b;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 30px; /* Bohot rounded corners for a cute look */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            max-width: 90%;
            width: 450px;
        }

        h1 {
            /* 'Fredoka' font cute characters ke liye perfect hai */
            font-family: 'Fredoka', sans-serif;
            font-size: 3rem;
            margin-bottom: 10px;
            color: #4f46e5; /* Pyara sa purple/blue color */
            margin-top: 0;
            display: inline-block;
        }

        .pulse-emoji {
            font-size: 2.8rem;
            display: inline-block;
            animation: bounce 2s ease-in-out infinite; /* Bouncy pulse emoji */
        }

        p {
            font-size: 1.2rem;
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .dot {
            width: 15px;
            height: 15px;
            background-color: #a5b4fc;
            border-radius: 50%;
            animation: dot-jump 1.5s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; background-color: #818cf8; }
        .dot:nth-child(3) { animation-delay: 0.4s; background-color: #6366f1; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        @keyframes dot-jump {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .footer {
            font-size: 0.9rem;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BachelorPulse</h1>
        <div class="pulse-emoji">💓</div>
        <p>Arey wah! Kuch bohot mazedaar aa raha hai... Bas thodi der aur! ✨</p>
        
        <div class="loader-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <div class="footer">
            Study hard, party harder!
        </div>
    </div>
</body>
</html>
